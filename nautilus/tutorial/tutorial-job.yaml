apiVersion: batch/v1
kind: Job
metadata:
  name: tutorial-job
spec:
  template:
    spec:
      containers:
      - name: gpu-container
        image: dhbhatt/rainbow-demorl:latest
        command: ["/bin/bash","-c"]
        args: ["mkdir MNIST; cd MNIST;
                wget https://raw.githubusercontent.com/pytorch/examples/main/mnist/main.py;
                python main.py --save-model;
                mv mnist_cnn.pt /nikola-volume"]
        volumeMounts:
        - mountPath: /nikola-volume
          name: nikola-volume
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "8G"
            cpu: "4"
          requests:
            nvidia.com/gpu: "1"
            memory: "8G"
            cpu: "4"
      restartPolicy: Never
      volumes:
        - name: nikola-volume
          persistentVolumeClaim:
            claimName: nikola-volume
