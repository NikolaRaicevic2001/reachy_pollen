apiVersion: v1
kind: Pod
metadata:
  name: reachy-pod
spec:
  containers:
  - name: gpu-container
    image: dhbhatt/rainbow-demorl:latest
    command: ["jupyter", "lab", "--NotebookApp.token=627a7b3b"]
    volumeMounts:
    - mountPath: /nikola-volume
      name: nikola-volume
    resources:
      limits:
        nvidia.com/gpu: "1"
        memory: "16G"
        cpu: "16"
  restartPolicy: Never
  volumes:
    - name: nikola-volume
      persistentVolumeClaim:
        claimName: nikola-volume
